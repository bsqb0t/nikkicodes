<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>无限暖暖 · 搭配码图鉴</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <h1>无限暖暖 · 搭配码图鉴</h1>
      <p class="subtitle">浏览、搜索、复制你喜爱的搭配</p>
    </div>
  </header>

  <main>
    <div class="toolbar">
      <div class="search-wrap">
        <input type="text" id="search" placeholder="搜索名称、套装、颜色、搭配码...">
      </div>
      <button id="clearFilters" class="clear-btn" style="display:none">清除所有筛选</button>
    </div>

    <div id="filters"></div>

    <div class="result-bar">
      <span id="resultCount">共 0 个搭配</span>
    </div>

    <div class="grid" id="grid">
      <div class="loading">加载中...</div>
    </div>

    <div class="pagination" id="pagination"></div>
  </main>

  <footer>
    <p>搭配数据仅供参考 · 图片可替换为本地截图</p>
  </footer>

  <div id="toast"></div>
  <div id="lightbox" class="lightbox" onclick="closeLightbox()">
    <span class="lightbox-close">&times;</span>
    <img class="lightbox-img" id="lightboxImg" alt="原图">
  </div>

  <script src="js/app.js"></script>
</body>
</html>
